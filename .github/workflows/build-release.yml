name: 构建跨平台安装包

on:
  push:
    tags:
      - 'v*'    # 推送 v1.0.0 这类 tag 时触发构建
  workflow_dispatch:   # 也支持手动触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: 差旅搭子-linux-x64
            ext: tar.gz
          - os: macos-latest
            artifact_name: 差旅搭子-macos
            ext: dmg
          - os: windows-latest
            artifact_name: 差旅搭子-windows-x64
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Linux 安装 Qt 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libdbus-1-3 libxkbcommon0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xkb1

      - name: PyInstaller 打包
        run: python -m PyInstaller chailv_dazi.spec --noconfirm

      - name: Linux 打 tar.gz
        if: runner.os == 'Linux'
        run: |
          cd dist && tar czf ../${{ matrix.artifact_name }}.${{ matrix.ext }} 差旅搭子/

      - name: macOS 打 DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "差旅搭子" \
            -srcfolder dist/差旅搭子.app \
            -ov -format UDZO \
            ${{ matrix.artifact_name }}.${{ matrix.ext }}

      - name: Windows 打 ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 用 7z 压缩（避免 Compress-Archive 对中文路径的编码问题）
          7z a -tzip ${{ matrix.artifact_name }}.${{ matrix.ext }} ./dist/差旅搭子/*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 显示产物
        run: ls -lhR artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 差旅搭子 ${{ github.ref_name }}
          body: |
            ## 差旅搭子 ${{ github.ref_name }}

            ### 下载说明
            | 平台 | 文件 | 说明 |
            |---|---|---|
            | Windows | `差旅搭子-windows-x64.zip` | 解压后双击 `差旅搭子.exe` |
            | macOS | `差旅搭子-macos.dmg` | 打开 dmg 拖入「应用程序」 |
            | Linux | `差旅搭子-linux-x64.tar.gz` | 解压后运行 `./差旅搭子` |

            首次启动 macOS 版如遇"无法验证开发者"提示，请在「系统设置 → 隐私与安全性」中点「仍要打开」。
          files: artifacts/*
          draft: false
          prerelease: false
